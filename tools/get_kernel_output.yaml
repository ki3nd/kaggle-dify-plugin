identity:
  name: "get_kernel_output"
  author: "ki3nd"
  label:
    en_US: "Get Kernel Output"
    zh_Hans: "Get Kernel Output"
    pt_BR: "Get Kernel Output"
    ja_JP: "Get Kernel Output"
description:
  human:
    en_US: "Download a single output file from a completed Kaggle kernel and return its content together with the kernel logs."
    zh_Hans: "Download a single output file from a completed Kaggle kernel and return its content together with the kernel logs."
    pt_BR: "Download a single output file from a completed Kaggle kernel and return its content together with the kernel logs."
    ja_JP: "Download a single output file from a completed Kaggle kernel and return its content together with the kernel logs."
  llm: "Check if a Kaggle kernel is complete, then download a specific output file by its Kaggle path (e.g. /kaggle/working/output.csv). Returns the kernel logs as metadata followed by the file content. Yields an informative message if the kernel is still running, queued, or has failed."
parameters:
  - name: kernel_id
    type: string
    required: true
    form: llm
    label:
      en_US: Kernel ID
      zh_Hans: Kernel ID
      pt_BR: Kernel ID
      ja_JP: Kernel ID
    human_description:
      en_US: "Kernel identifier as owner/kernel-slug, or just kernel-slug to use the authenticated user as owner."
      zh_Hans: "Kernel identifier as owner/kernel-slug, or just kernel-slug to use the authenticated user as owner."
      pt_BR: "Kernel identifier as owner/kernel-slug, or just kernel-slug to use the authenticated user as owner."
      ja_JP: "Kernel identifier as owner/kernel-slug, or just kernel-slug to use the authenticated user as owner."
    llm_description: "Kaggle kernel identifier as owner/kernel-slug (e.g. alice/my-kernel), or just kernel-slug to auto-prefix with the authenticated user's username."
  - name: file_path
    type: string
    required: false
    form: llm
    label:
      en_US: File Path
      zh_Hans: File Path
      pt_BR: File Path
      ja_JP: File Path
    human_description:
      en_US: "Path of the output file to retrieve. Accepts absolute Kaggle paths (e.g. /kaggle/working/output.csv) or relative paths (e.g. images/1.png). Leave empty to return only the kernel logs without downloading any file."
      zh_Hans: "Path of the output file to retrieve. Accepts absolute Kaggle paths (e.g. /kaggle/working/output.csv) or relative paths (e.g. images/1.png). Leave empty to return only the kernel logs without downloading any file."
      pt_BR: "Path of the output file to retrieve. Accepts absolute Kaggle paths (e.g. /kaggle/working/output.csv) or relative paths (e.g. images/1.png). Leave empty to return only the kernel logs without downloading any file."
      ja_JP: "Path of the output file to retrieve. Accepts absolute Kaggle paths (e.g. /kaggle/working/output.csv) or relative paths (e.g. images/1.png). Leave empty to return only the kernel logs without downloading any file."
    llm_description: "Path to a specific output file. Accepts absolute Kaggle paths (e.g. /kaggle/working/output.csv) or relative paths under /kaggle/working/ (e.g. images/1.png). Omit to return only the kernel logs without downloading any file."
extra:
  python:
    source: tools/get_kernel_output.py
