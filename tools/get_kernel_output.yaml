identity:
  name: "get_kernel_output"
  author: "ki3nd"
  label:
    en_US: "Get Kernel Output"
    zh_Hans: "Get Kernel Output"
    pt_BR: "Get Kernel Output"
    ja_JP: "Get Kernel Output"
description:
  human:
    en_US: "Download a single output file from a completed Kaggle kernel and return its content together with the kernel logs."
    zh_Hans: "Download a single output file from a completed Kaggle kernel and return its content together with the kernel logs."
    pt_BR: "Download a single output file from a completed Kaggle kernel and return its content together with the kernel logs."
    ja_JP: "Download a single output file from a completed Kaggle kernel and return its content together with the kernel logs."
  llm: "Check if a Kaggle kernel is complete, then download a specific output file by its Kaggle path (e.g. /kaggle/working/output.csv). Returns the kernel logs as metadata followed by the file content. Yields an informative message if the kernel is still running, queued, or has failed."
parameters:
  - name: kernel_id
    type: string
    required: true
    form: llm
    label:
      en_US: Kernel ID
      zh_Hans: Kernel ID
      pt_BR: Kernel ID
      ja_JP: Kernel ID
    human_description:
      en_US: "Kernel identifier in the format owner/kernel-slug."
      zh_Hans: "Kernel identifier in the format owner/kernel-slug."
      pt_BR: "Kernel identifier in the format owner/kernel-slug."
      ja_JP: "Kernel identifier in the format owner/kernel-slug."
    llm_description: "Kaggle kernel identifier in the format owner/kernel-slug."
  - name: file_path
    type: string
    required: true
    form: llm
    label:
      en_US: File Path
      zh_Hans: File Path
      pt_BR: File Path
      ja_JP: File Path
    human_description:
      en_US: "Kaggle path of the output file to retrieve, e.g. /kaggle/working/output.csv or /kaggle/working/images/result.png"
      zh_Hans: "Kaggle path of the output file to retrieve, e.g. /kaggle/working/output.csv or /kaggle/working/images/result.png"
      pt_BR: "Kaggle path of the output file to retrieve, e.g. /kaggle/working/output.csv or /kaggle/working/images/result.png"
      ja_JP: "Kaggle path of the output file to retrieve, e.g. /kaggle/working/output.csv or /kaggle/working/images/result.png"
    llm_description: "Absolute Kaggle path to the specific output file, e.g. /kaggle/working/output.csv. Only a single file path is supported (not a directory)."
extra:
  python:
    source: tools/get_kernel_output.py
